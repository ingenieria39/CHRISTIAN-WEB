<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso — Christian Web</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .brand {
      color: #e94560;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 32px;
      text-decoration: none;
    }

    .card {
      background: #16213e;
      border-radius: 14px;
      padding: 40px 44px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* TABS */
    .tabs {
      display: flex;
      margin-bottom: 28px;
      border-bottom: 2px solid #0f3460;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: #888;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 10px 0 12px;
      cursor: pointer;
      transition: color 0.2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }

    .tab-btn.active {
      color: #e94560;
      border-bottom-color: #e94560;
    }

    /* FORM */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .form-panel h2 {
      color: #fff;
      font-size: 1.3rem;
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #aaa;
      font-size: 0.82rem;
      margin-bottom: 6px;
      margin-top: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      background: #0f3460;
      border: 1px solid #1a4a80;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #e94560; }

    .btn {
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #c73652; }
    .btn:disabled { background: #6b2233; cursor: not-allowed; }

    /* MENSAJES */
    .msg {
      margin-top: 16px;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .msg.success { background: #0d3d2e; color: #4ade80; display: block; }
    .msg.error   { background: #3d0d0d; color: #f87171; display: block; }

    /* PANEL AUTENTICADO */
    #panel-auth {
      display: none;
      text-align: center;
    }

    #panel-auth .check {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    #panel-auth h2 {
      color: #fff;
      font-size: 1.4rem;
      margin-bottom: 8px;
    }

    #panel-auth p {
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    #panel-auth .email-badge {
      display: inline-block;
      background: #0f3460;
      color: #e94560;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.88rem;
      margin-bottom: 28px;
    }

    .btn-logout {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 2px solid #e94560;
      color: #e94560;
      border-radius: 30px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover { background: #e94560; color: #fff; }

    .back-link {
      margin-top: 20px;
      display: inline-block;
      color: #888;
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: #e94560; }
  </style>
</head>
<body>

  <a href="index.html" class="brand">Christian Web</a>

  <div class="card">

    <!-- PANEL: NO AUTENTICADO -->
    <div id="panel-login">
      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Iniciar sesión</button>
        <button class="tab-btn" data-tab="register">Registrarse</button>
      </div>

      <!-- LOGIN -->
      <div class="form-panel active" id="tab-login">
        <h2>Bienvenido de vuelta</h2>
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="tu@email.com" />
        <label for="login-pass">Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••" />
        <button class="btn" id="btn-login">Iniciar sesión</button>
        <div class="msg" id="msg-login"></div>
      </div>

      <!-- REGISTER -->
      <div class="form-panel" id="tab-register">
        <h2>Crea tu cuenta</h2>
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="tu@email.com" />
        <label for="reg-pass">Contraseña</label>
        <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" />
        <button class="btn" id="btn-register">Crear cuenta</button>
        <div class="msg" id="msg-register"></div>
      </div>
    </div>

    <!-- PANEL: AUTENTICADO -->
    <div id="panel-auth">
      <div class="check">✅</div>
      <h2>Usuario autenticado</h2>
      <p>Has iniciado sesión como:</p>
      <span class="email-badge" id="user-email"></span>
      <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
      <br/>
      <a href="index.html" class="back-link">← Volver al inicio</a>
    </div>

  </div>

  <script type="module">
    import { login, register, logout, getSession } from './auth.js'

    const panelLogin = document.getElementById('panel-login')
    const panelAuth  = document.getElementById('panel-auth')
    const userEmail  = document.getElementById('user-email')

    function showAuth(email) {
      panelLogin.style.display = 'none'
      panelAuth.style.display  = 'block'
      userEmail.textContent    = email
    }

    function showMessage(id, text, type) {
      const el = document.getElementById(id)
      el.textContent  = text
      el.className    = `msg ${type}`
    }

    function setLoading(btn, loading) {
      btn.disabled    = loading
      btn.textContent = loading ? 'Cargando...' : btn.dataset.label
    }

    // Verificar sesión al cargar
    getSession().then(session => {
      if (session) showAuth(session.user.email)
    })

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
        document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'))
        btn.classList.add('active')
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active')
      })
    })

    // Login
    const btnLogin = document.getElementById('btn-login')
    btnLogin.dataset.label = 'Iniciar sesión'
    btnLogin.addEventListener('click', async () => {
      const email    = document.getElementById('login-email').value.trim()
      const password = document.getElementById('login-pass').value
      if (!email || !password) return showMessage('msg-login', 'Completa todos los campos.', 'error')
      setLoading(btnLogin, true)
      try {
        const data = await login(email, password)
        showAuth(data.user.email)
      } catch (err) {
        showMessage('msg-login', err.message, 'error')
      } finally {
        setLoading(btnLogin, false)
      }
    })

    // Register
    const btnReg = document.getElementById('btn-register')
    btnReg.dataset.label = 'Crear cuenta'
    btnReg.addEventListener('click', async () => {
      const email    = document.getElementById('reg-email').value.trim()
      const password = document.getElementById('reg-pass').value
      if (!email || !password) return showMessage('msg-register', 'Completa todos los campos.', 'error')
      if (password.length < 6)  return showMessage('msg-register', 'La contraseña debe tener al menos 6 caracteres.', 'error')
      setLoading(btnReg, true)
      try {
        await register(email, password)
        showMessage('msg-register', '¡Cuenta creada! Revisa tu email para confirmar.', 'success')
      } catch (err) {
        showMessage('msg-register', err.message, 'error')
      } finally {
        setLoading(btnReg, false)
      }
    })

    // Logout
    document.getElementById('btn-logout').addEventListener('click', async () => {
      await logout()
      panelAuth.style.display  = 'none'
      panelLogin.style.display = 'block'
    })
  </script>

</body>
</html>
